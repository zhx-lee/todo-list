      <option value="Work"></option>

    <button id="addBtn">Add</button>

        <td>checkbox</td>

        <td>

            <option value="all">all</option>

        </td>
        <td>delete</td>
      </tr>
    </table>
    <script src="todo.js"></script>
  </body>
